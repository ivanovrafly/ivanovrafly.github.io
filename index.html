<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Ivanov</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px;
    background-blend-mode: darken;
    background-color: rgba(0,0,0,0.5);
}

/* NAVBAR */
nav {
    position: absolute;
    top: 0;
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

/* TEXT HERO */
.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    max-width: 500px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #00c896;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* CARD SECTION */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
    background: #f4f4f4;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    text-align: center;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .hero h1 {
        font-size: 30px;
    }

    nav {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
</nav>

<div class="hero">
    <h1>Ahmad Ivanov Rafly</h1>
    <p>Mahasiswa Teknologi Rekayasa Konstruksi Bangunan Air dengan minat di bidang teknik pantai dan pemodelan.</p>
    <button class="btn">Lihat Portofolio</button>
</div>

<div class="cards">
    <div class="card">
        <h3>Modeling</h3>
        <p>MIKE 21 & simulasi gelombang</p>
    </div>

    <div class="card">
        <h3>GIS</h3>
        <p>Pemetaan bathymetry dengan ArcGIS</p>
    </div>

    <div class="card">
        <h3>Analisis</h3>
        <p>Pasang surut metode Admiralty</p>
    </div>
</div>

</body>
</html>
