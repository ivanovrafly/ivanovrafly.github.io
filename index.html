<!DOCTYPE html>
<html lang="id">
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Ivanov</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}

/* HERO (TIDAK DIUBAH) */
.hero{
position:relative;height:100vh;display:flex;
align-items:center;justify-content:space-between;
padding:80px;color:white;
background:url('bg_home.png') no-repeat center/cover;
}
.hero::before{
content:"";position:absolute;inset:0;
background:rgba(0,0,0,0.6);
}
.hero-content{position:relative;z-index:2;max-width:600px;}
.hero-content h1{font-size:60px;}
.hero-content h2{font-size:22px;color:#00c896;margin-top:10px;}
.hero-content p{margin-top:20px;color:#ccc;}
.hero-btn{margin-top:30px;display:flex;gap:15px;}
.btn-outline,.btn-solid{
padding:12px 25px;border-radius:6px;text-decoration:none;
}
.btn-outline{border:2px solid #00c896;color:#00c896;}
.btn-outline:hover{background:#00c896;color:black;}
.btn-solid{background:#00c896;color:black;}
.btn-solid:hover{opacity:.8;}

/* NAVBAR */
.navbar{position:absolute;top:30px;right:40px;z-index:999;}
.menu-toggle{font-size:28px;color:white;cursor:pointer;}
.menu{
display:none;flex-direction:column;
position:absolute;right:0;top:40px;
background:rgba(0,0,0,0.85);
border-radius:10px;
}
.menu a{padding:12px 20px;color:white;text-decoration:none;}
.menu a:hover{background:rgba(0,200,150,0.2);color:#00c896;}

/* SECTION */
section{padding:100px;min-height:100vh;}

/* ABOUT (TIDAK DIUBAH) */
.about{
display:flex;justify-content:center;align-items:center;
padding:100px 10%;
background:radial-gradient(circle,#0a0a0a,#000);
color:white;
}
.about-container{
display:flex;gap:60px;max-width:1100px;width:100%;
}
.about-img img{
width:300px;border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}
.about-content{display:flex;justify-content:center;}
.about-card{
max-width:520px;padding:40px;border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border:1px solid rgba(0,200,150,0.2);
}
.about-card p{line-height:1.8;color:#ccc;text-align:justify;}

/* SLIDER */
.slider{display:flex;align-items:center;gap:20px;}
.slider-track{position:relative;min-width:220px;}
.slide{
opacity:0;position:absolute;
transform:translateY(10px);
transition:.5s;
background:rgba(255,255,255,0.05);
padding:12px 20px;border-radius:10px;
}
.slide.active{opacity:1;position:relative;transform:none;}
.prev,.next{
width:45px;height:45px;border-radius:12px;
background:rgba(0,200,150,0.15);
color:white;border:none;cursor:pointer;
}
.slide a{color:#00c896;text-decoration:none;}

/* ===================== */
/* TIMELINE (FIXED) */
/* ===================== */

.timeline-section{
padding:120px 10%;
background:radial-gradient(circle,#0a0a0a,#000);
color:white;
}

.timeline-title{
font-size:42px;margin-bottom:80px;
text-shadow:0 0 20px rgba(0,200,150,0.3);
}

.timeline{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
}

.timeline-line{
position:absolute;top:50%;left:0;width:100%;
height:4px;background:#222;
transform:translateY(-50%);
}

.timeline-progress{
position:absolute;top:50%;left:0;
height:4px;width:0%;
background:linear-gradient(90deg,#00c896,#00ffcc);
transform:translateY(-50%);
box-shadow:0 0 20px #00c896;
transition:.5s;
}

.timeline-item{width:22%;text-align:center;}

.timeline-dot{
width:18px;height:18px;background:#555;
border-radius:50%;margin:auto;
}

.timeline-item.active .timeline-dot{
background:#00c896;
box-shadow:0 0 15px #00c896;
}

.timeline-content{
margin-top:25px;
background:rgba(255,255,255,0.05);
padding:20px;border-radius:12px;
backdrop-filter:blur(10px);
}

.timeline-content h3{color:#00c896;}
.timeline-content span{color:#aaa;font-size:13px;}
.timeline-content p{color:#ddd;margin-top:10px;}

.timeline-item:hover .timeline-content{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(0,200,150,0.3);
}

/* MOBILE */
@media(max-width:768px){
.hero{flex-direction:column;text-align:center;}
.about-container{flex-direction:column;}
.timeline{flex-direction:column;gap:50px;}
.timeline-line,.timeline-progress{display:none;}
.timeline-item{width:100%;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>IVANOV RAFLY</h1>
<h2>Water Infrastructure Engineering Student</h2>
<p>Building sustainable and resilient water systems.</p>
</div>
</section>

<!-- ABOUT -->
<section class="about">
<div class="about-container">

<div class="about-img">
<img src="BackgorundHome.jpeg">
</div>

<div class="about-content">
<div class="about-card">
<h4>HELLO 👋</h4>
<p>
Saya merupakan mahasiswa tingkat akhir D4 Teknik Infrastruktur Sipil ITS...
</p>

<div class="slider">
<button class="prev">❮</button>
<div class="slider-track">
<div class="slide active"><a href="#edu">Education</a></div>
</div>
<button class="next">❯</button>
</div>

</div>
</div>
</div>
</section>

<!-- TIMELINE -->
<section id="edu" class="timeline-section">
<h1 class="timeline-title">Education Journey</h1>

<div class="timeline">
<div class="timeline-line"></div>
<div class="timeline-progress" id="progress"></div>

<div class="timeline-item active">
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3>MI</h3><span>2009-2015</span>
</div>
</div>

<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3>MTs</h3><span>2015-2018</span>
</div>
</div>

<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3>MA</h3><span>2018-2021</span>
</div>
</div>

<div class="timeline-item">
<div class="timeline-dot"></div>
<div class="timeline-content">
<h3>ITS</h3><span>2022-Sekarang</span>
</div>
</div>

</div>
</section>

<script>
const items=document.querySelectorAll(".timeline-item");
const progress=document.getElementById("progress");

window.addEventListener("scroll",()=>{
let section=document.querySelector(".timeline-section");
let rect=section.getBoundingClientRect();
let h=window.innerHeight;

if(rect.top<h){
let p=(h-rect.top)/(h+rect.height);
p=Math.min(Math.max(p,0),1);

progress.style.width=p*100+"%";

items.forEach((el,i)=>{
if(p>i/items.length){
el.classList.add("active");
}
});
}
});
</script>

</body>
</html>
